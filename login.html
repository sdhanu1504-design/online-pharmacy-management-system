<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health Hub - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0b3d91;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #0a2f6b;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            text-align: center;
        }

        .logo {
            width: 90px;
            margin-bottom: 10px;
        }

        h1 {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background-color: white;
            color: #0b3d91;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #dcdcdc;
        }

        .link {
            margin-top: 15px;
            display: block;
            color: #dcdcdc;
            font-size: 14px;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Logo -->
        <img src="logo.png" alt="Health Hub Logo" class="logo">

        <!-- Title -->
        <h1>Login</h1>

        <!-- Login Form -->
        <form>
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>

        <!-- Register Link -->
        <a href="index.html" class="link">Don't have an account? Register</a>

    </div>

</body>
</html>
